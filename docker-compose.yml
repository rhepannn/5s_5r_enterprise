version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: 5s_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-5s_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-5s_password}
      POSTGRES_DB: ${POSTGRES_DB:-5s_enterprise}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - 5s_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-5s_user} -d ${POSTGRES_DB:-5s_enterprise}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: 5s_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-5s_mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-5s_mongo_pass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-5s_logs}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - 5s_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: 5s_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-5s_redis_pass}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - 5s_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-5s_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: 5s_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-5s_minio_access}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-5s_minio_secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - 5s_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

networks:
  5s_network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  minio_data:
